<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>{{title}}</title>
</head>
<body>
    <div class="container">
        <h1>{{title}}</h1>
        <table id="tabella">
            <tr>
                <th>Title</th>
                <th>Director</th>
                <th>Year</th>
                <th>Genre</th>
                <th>Rating</th>
            </tr>
            <tbody>

            </tbody>
        </table>
    </div>
    <script>
        fetch('/api/films')
            .then(response => response.json())
            .then(data => {
                const tbody = document.querySelector('#tabella tbody');
                data.forEach(film => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${film.Title}</td>
                        <td>${film.Director}</td>
                        <td>${film.Year}</td>
                        <td>${film.Genre}</td>
                        <td>${film.Rating}</td>
                    `;
                    tbody.appendChild(row);
                });
            });
    </script>
</body>
</html>
